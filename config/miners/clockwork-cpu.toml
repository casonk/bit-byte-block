[[jobs]]
name = "bit-byte-block-cpu-miner"
description = "Bitcoin CPU miner (cpuminer-opt) – solo.ckpool.org"
scope = "user"
service_type = "simple"
working_directory = "%h/git/util-repos/bit-byte-block"
exec_start = "/bin/bash -lc 'exec cpuminer-opt --config %h/git/util-repos/bit-byte-block/config/miners/cpuminer.json'"
restart = "on-failure"
restart_sec = "30"
standard_output = "journal"
standard_error = "journal"
service_install_wanted_by = ["default.target"]
