[[jobs]]
name = "bit-byte-block-amd-miner"
description = "Bitcoin AMD GPU miner (cgminer) – solo.ckpool.org"
scope = "user"
service_type = "simple"
working_directory = "%h/git/util-repos/bit-byte-block"
exec_start = "/bin/bash -lc 'exec cgminer -c %h/git/util-repos/bit-byte-block/config/miners/cgminer.conf'"
restart = "on-failure"
restart_sec = "30"
standard_output = "journal"
standard_error = "journal"
service_install_wanted_by = ["default.target"]
